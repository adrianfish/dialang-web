<div id="advfb-advice-header">Følgende forslag kan hjelpe deg til å komme på C2-nivå: 	</div>
<ul id="advfb-advice-list">
    <li>Lytt til radioprogrammer, se TV og filmer på italiensk jevnlig.</li>
    <li>Forsøk å lytte til dialektpreget og ikke-standardisert bruk av italiensk, slik at du blir vant til særtrekkene.</li>
</ul>
