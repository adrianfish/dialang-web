<div id="advfb-advice-header">以下建议有助于将你的水平提高至C1级别：</div>
<ul id="advfb-advice-list">
    <li>留意文本中作者表明立场或发表观点的地方（尽管其观点可能比较隐晦），辨别作者的表现手法。</li>
    <li>定期阅读英语的大众新闻杂志、日报和小说。</li>
    <li>在阅读更加复杂的文本或长文本时，你需要找出自己不理解的部分并标记出来。仔细阅读难点部分及整个文本。可以借助词典、母语人士及其他文本信息的帮助。</li>
    <li>将阅读中遇到的新单词和习语记录下来，尤其是你的专业或常用领域内的单词和习语；定期进行有条理的复习从而保证你熟悉这些新的内容。</li>
</ul>
