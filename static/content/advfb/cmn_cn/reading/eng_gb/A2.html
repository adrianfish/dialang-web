<div id="advfb-advice-header">以下建议有助于将你的水平提高至B1级别：</div>
<ul id="advfb-advice-list">
    <li>扩大所阅读文本的题材范围和文本类型。阅读英语报纸和杂志，仔细阅读其中一两篇你感兴趣的较难文章，在必要时可使用词典。</li>
    <li>在用英语论述、描述和表达感受、愿望时，注意特定的表述、短语和词汇。</li>
    <li>尽量理解文本的细节信息，而不仅仅满足于理解其主旨大意。将你认为有用的、需要掌握的表述记录下来。</li>
    <li>保证英语阅读量。虽然你已经能读懂很多信息，但还应保证英语阅读量、偶尔精读较难文章，积极提高阅读能力。</li>
</ul>
