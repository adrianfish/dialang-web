<div id="advfb-advice-header">以下建议有助于将你的水平提高至C2级别：</div>
<ul id="advfb-advice-list">
    <li>可通过一些方式设法扩大你的词汇量，如集中一段时间在词典中查找所有生词、分析单词在语境中的特殊含义、或留心搜集习语的用法和语境。</li>
    <li>学习相近表述在意义上的细微区别（如文体、写作方面的词典和指导手册）。</li>
    <li>留意作者传达信息的方法（公开的或隐晦的）、借助的资源、在叙述中作者的角色定位是旁观者还是参与者、以及作者是否认为自己是目标读者。</li>
    <li>阅读西班牙语版而非中文版的新机器说明书。</li>
    <li>坚持阅读西班牙语通俗小说，将其视为一种休闲活动；在阅读与自己专业领域或兴趣相关的非文学性文本时，应首选西班牙语版而非中文版。</li>
</ul>
