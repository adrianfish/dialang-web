<div id="advfb-advice-header">以下建议有助于将你的水平提高至A2级别：</div>
<ul id="advfb-advice-list">
    <li>参加西班牙语学习班，学习更多的句法和词汇，注意句子结构以及主从句之间的衔接。</li>
    <li>学习基本的西班牙语的书信写作方式，例如，学习给朋友和陌生人写信时如何使用不同的开头和结尾。</li>
    <li>尽量多阅读、多听或多使用西班牙语；在该阶段，与西班牙语任何形式的接触都会促进写作能力的提高。</li>
    <li>把新单词、句型记在本子上便于学习，同时提高你的拼写水平。</li>
    <li>试着了解西班牙语生词的构词法。</li>
</ul>
