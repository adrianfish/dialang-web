<div id="advfb-advice-header">以下建议有助于将你的水平提高至C1级别：</div>
<ul id="advfb-advice-list">
    <li>借助词典、指导手册、母语人士和熟练的语言使用者等资源，努力解决你在写作中已意识到存在的难点。</li>
    <li>将阅读中遇到的新单词和习语记录下来，尤其是那些在你专业领域内或阅读经常涉及的话题内的单词和习语；系统地复习以保证你一直熟悉这些新内容。</li>
    <li>留意文本中作者表明立场或发表观点的地方（尽管其观点可能比较隐晦），辨别作者的表现手法。</li>
    <li>研究不同语境下写作的区别，例如，学术语境、工作语境和休闲语境；如果你对某一特定的话题领域了解得比较多，尝试向非专业人士撰写该方面的文章。</li>
</ul>
