<div id="advfb-advice-header">以下建议有助于将你的水平提高至B1级别：</div>
<ul id="advfb-advice-list">
    <li>增加写作的题材范围和文本类型，例如试着将同样内容的信写给不同的人：朋友、客人、顾客、雇主等，注意所写内容的风格和正式程度。</li>
    <li>学习写议论文、记叙文或表达感受和意愿时常用的意大利语表述、短语和词汇；可将这些内容记录在你的词汇本中以便参考。</li>
    <li>注意如何写内容完整、结构合理的文本（如何组织文本、如何使用连接词）；当你准备写长文本时，首先要画一个思维图。</li>
    <li>学习意大利语中的礼貌用语，不礼貌比语言错误更让人难以忍受，会导致你的信件和消息起不到应有的作用。</li>
    <li>每天都用意大利语写点东西，例如，写日记。 </li>
</ul>
