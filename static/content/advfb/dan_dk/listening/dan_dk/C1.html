<div id="advfb-advice-header">De følgende forslag kan måske hjælpe dig henimod C2 og videre:</div>
<ul id="advfb-advice-list">
    <li>Sørg for regelmæssigt at lytte til radioprogrammer og se TV og film på dansk.</li>
    <li>Sørg for at komme mere i berøring med ualmindeligt og dialektpræget dansk, så du vænner dig til sproglige særtræk.<br/><br/></li>
</ul>
