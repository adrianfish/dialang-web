<div class="explfb-title">Ayuda</div>
<p class="explfb-part">En la mayoría de exámenes no está permitido usar diccionarios ni gramáticas, y mucho menos pedir ayuda (¡lo que se consideraría copiar!). En la vida real recurrimos con frecuencia a la ayuda externa y usamos la lengua de una manera más eficaz de lo que lo haríamos en una situación de examen.</p>
