<div class="explfb-title">你因为自已在某一语言领域内遇到的困难而低估自己的水平</div>
<p class="explfb-part">你过去在某一技能方面的学习经历可能会导致你低估自己在其他领域的能力。例如，关注语法和词汇学习、避免犯错的学习者在使用语言时可能会因为他们总感觉到自己犯的错误而认为自己的口语和写作能力水平很低。有些教师过于强调学生犯的错误，而不认可学生用语言做事的能力。这些教师的反馈有时可能会加强学习者的错觉。因此，当学习者在语言测试中得到的成绩比预期的好时，他们会感到很惊讶，因为他们原来只关注语言能力的一两个方面（例如，准确性），而该测试则更全面地包括了语言能力的各个方面。</p>
