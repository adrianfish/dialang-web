<div class="explfb-title">将自己与同语种学习者进行比较</div>
<p class="explfb-part">我们通常会将自己的能力与其他人的能力进行比较 。同事、同学或者其他学习这种语言的人都会影响我们对自己语言水平的看法。随着结识更多不同水平的语言学习者，我们就越有可能如实地了解自己的位置、知道自己是否能比其他人做得更好。</p>
<p class="explfb-part">如果你遇到的同语种学习者人数较少，那么你就很难了解各技能及相应的能力水平的情况。假设你所在班级学生的语言学习水平是全校最差的，或者你遇到的大多是能力水平明显超过你的学习者，这很可能会导致你低估自己的能力。另一方面，假设你所在班级学生的水平是全学校最棒的，或者你只遇到了比你水平低的学习者，这很可能会导致你高估自己的能力。</p>
