<div class="explfb-title">你只使用某些语言技能</div>
<p class="explfb-part">语言能力复杂。它包括你以不同水平掌握的多种技能和领域。你可能主要用你所学的语言进行阅读或口语交流，而很少用其他技能。你使用某一技能遇到或没有遇到问题会影响你对自己使用其他技能的能力的评价。</p>
<p class="explfb-part">For example, you may <a id="overestimate" href="javascript:;">overestimate</a> your skills because you are fairly good in one particular skill. Or you may <a id="underestimate" href="javascript:;">underestimate</a> your skills because you encounter problems with a particular skill.</p>
