<div class="explfb-title">你使用所测语言的频率</div>
<p class="explfb-part">你的自我评估结果和DIALANG测试结果不匹配的原因可能是：</p>
<ul class="explfb-list">
    <li><a id="infrequently" href="javascript:;">你不经常使用该语言</a></li>
    <li><a id="longtime" href="javascript:;">你已有一段时间未使用该语言</a></li>
</ul>
<p class="explfb-part">你可能学习过该语言，但并未在不同的情境下广泛使用这种语言。这意味着你可能会使用这种语言，但与使用该语言进行日常交流的人相比，使用频率没有那么高。</p>
