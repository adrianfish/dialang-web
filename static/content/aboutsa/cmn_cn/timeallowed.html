<div class="explfb-title">时间要求</div>
<p class="explfb-part">大部分测试都对你完成试题的时间有限制，而实际生活中，你有更多的时间，比如，阅读文本。但是与此相反的情况也可能成立：你会觉得实际情境比测试更难，因为前者对你的理解速度和反应速度要求更高。</p>
<p class="explfb-part">测试和实际情境不仅在完成任务的时间方面要求不同，其准备时间也不同。例如，你在实际生活中有很长的时间准备讲演，然而在测试情境中的准备时间则非常有限，这也会影响你的表现。</p>
<p class="explfb-part">是否有机会检查和修改你所写的内容也会影响可支配的时间。在实际生活中，你可以使用文字处理软件，而且有时间修改所写内容；在大多数考试中，你通常没有重写的时间。</p>
