<div class="explfb-title">DIALANG与其他国际语言测试</div>
<p class="explfb-part">语言学习者可以参加一些在多国组织并受到认可的国际语言测试。与一些学校测试和国家级测试相同，有些国际测试也可以告诉你在国际标准中的位置，例如，《欧洲语言共同参考框架》的六级语言能力标准。不过你也需要了解测试开发者对测试结果的解读：一些测试在报告测试结果时使用的描述与《欧洲语言共同参考框架》使用的描述不同。这两种描述的匹配或差别程度有多大呢？</p>
<p class="explfb-part">请注意：一些国际语言测试只针对特定职业或领域，这样的测试无法与DIALANG进行比较。</p>
