<div class="explfb-title">Hjælp</div>
<p class="explfb-part">I de fleste test er det ikke tilladt at bruge ordbøger, grammatikker eller stavekontrol - for slet ikke at tale om at bede nogen om hjælp- (det ville være snyderi!). I det virkelige liv kan du ofte bede andre om hjælp og således opnå et bedre resultat end du ville kunne i en testsituation.</p>
