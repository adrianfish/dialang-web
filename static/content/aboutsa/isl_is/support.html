<div class="explfb-title">Stuðningur</div>
<p class="explfb-part">Í flestum prófum færðu ekki að nota orðabækur, málfræðihandbækur eða stafsetningaorðabækur, hvað þá að biðja einhvern um hjálp (það væri talið svindl!). Í daglegu lífi getur þú oft gripið til utanaðkomandi hjálpar og þannig betrumbætt tal þitt miðað við það sem þú sýnir á prófi.</p>
